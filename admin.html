<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Dashboard | The Pet Corner</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="admin.css">

</head>

<body>

<div class="admin-container">

<aside class="sidebar">

<h2>The Pet Corner</h2>

<ul>
<li class="active">📦 Dashboard</li>
<li>🛍 Products</li>
<li>📋 Orders</li>
<li>👥 Customers</li>
<li>💬 Reviews</li>
<li>⚙ Settings</li>
</ul>

</aside>

<main class="dashboard">

<h1>Dashboard</h1>

<div class="stats">

<div class="card">
<h2 id="totalProducts">0</h2>
<p>Total Products</p>
</div>

<div class="card">
<h2 id="totalOrders">0</h2>
<p>Total Orders</p>
</div>

<div class="card">
<h2>₹0</h2>
<p>Total Sales</p>
</div>

<div class="card">
<h2 id="totalCustomers">0</h2>
<p>Customers</p>
</div>

</div>

<h2>Add New Product</h2>

<form id="productForm">

<input
type="text"
id="productName"
placeholder="Product Name"
required>

<input
type="number"
id="productPrice"
placeholder="Price"
required>

<input
type="text"
id="productImage"
placeholder="Image Path"
required>

<button type="submit">

Add Product

</button>

</form>

<h2>Product List</h2>

<div id="productList">

<!-- Products JS se aayenge -->

</div>

</main>

</div>

<script src="admin.js"></script>

</body>
</html>
